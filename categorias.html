<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SócioAll — Categorias</title>
<script>if (localStorage.getItem("sa_sidebar_collapsed") === "1") document.documentElement.classList.add("sa-sidebar-collapsed");</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" href="logo-icon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4 page-header">
        <h1 class="h4 mb-0">Categorias</h1>
        <div class="d-flex gap-2 page-header-actions">
          <button class="btn btn-outline-secondary" id="usarCategoriasPadraoBtn" onclick="usarCategoriasPadrao()"><i class="bi bi-magic me-1"></i>Usar categorias padrão</button>
          <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#novaCategoriaModal"><i class="bi bi-plus-lg me-1"></i>Nova categoria</button>
        </div>
      </div>

      <div class="card-sa">
        <div class="table-responsive">
          <table class="table table-sa">
            <thead><tr><th>Nome</th><th>Tipo</th><th></th></tr></thead>
            <tbody id="categoriasTableBody"></tbody>
          </table>
        </div>
      </div>
  </main>
</div>

<div class="modal fade" id="novaCategoriaModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="novaCategoriaForm">
        <div class="modal-header">
          <h2 class="h6 modal-title">Nova categoria</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small" for="categoriaNome">Nome</label>
            <input type="text" class="form-control" id="categoriaNome" required>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="categoriaTipo">Tipo</label>
            <select class="form-select" id="categoriaTipo" required>
              <option value="receita">Receita</option>
              <option value="despesa">Despesa</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary w-100" id="categoriaSubmitBtn">Salvar categoria</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/page-helpers.js"></script>
<script src="js/categorias.js"></script>
</body>
</html>

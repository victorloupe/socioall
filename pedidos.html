<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SócioAll — Pedidos</title>
<script>if (localStorage.getItem("sa_sidebar_collapsed") === "1") document.documentElement.classList.add("sa-sidebar-collapsed");</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" href="logo-icon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<button class="mobile-toggle-btn d-md-none" onclick="toggleMobileSidebar()" aria-label="Toggle menu" id="mobileToggleBtn">
  <i class="bi bi-list" id="mobileToggleIcon"></i>
</button>

<div class="mobile-overlay d-md-none" id="mobileOverlay" onclick="toggleMobileSidebar()"></div>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <main class="main-content">
      <h1 class="h4 mb-4">Pedidos</h1>

      <div class="card-sa mb-3">
        <div class="d-flex align-items-start gap-3">
          <i class="bi bi-info-circle fs-4 text-muted"></i>
          <div>
            <strong>Integração com marketplaces em breve.</strong>
            <p class="mb-0 text-muted small">Esta tela já está pronta para receber os pedidos das suas lojas automaticamente assim que a integração com cada marketplace for feita. Por enquanto não há nenhuma sincronização ativa.</p>
          </div>
        </div>
      </div>

      <div class="card-sa">
        <div class="table-responsive">
          <table class="table table-sa">
            <thead>
              <tr><th>Pedido</th><th>Produto</th><th>Loja</th><th>Valor</th><th>Status</th><th>Data</th></tr>
            </thead>
            <tbody id="pedidosTableBody"></tbody>
          </table>
        </div>
      </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/page-helpers.js"></script>
<script src="js/pedidos.js"></script>
</body>
</html>

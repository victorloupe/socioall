<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SócioAll — Entrar</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" href="logo-icon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="text-center mb-4">
      <img src="logo-full.png" alt="SócioAll — Gestão de contas entre sócios" class="login-logo">
    </div>

    <div class="card-sa">
      <ul class="nav nav-tabs mb-3" id="authTabs">
        <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#loginTab">Entrar</button></li>
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#signupTab">Criar conta</button></li>
      </ul>

      <div id="authError" class="alert alert-danger d-none py-2 small" role="alert"></div>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="loginTab">
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label small" for="loginEmail">Usuário</label>
              <input type="text" class="form-control" id="loginEmail" pattern="[a-zA-Z0-9_.\-]+" autocapitalize="off" autocorrect="off" required>
            </div>
            <div class="mb-3">
              <label class="form-label small" for="loginPassword">Senha</label>
              <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Entrar</button>
          </form>
        </div>

        <div class="tab-pane fade" id="signupTab">
          <form id="signupForm">
            <div class="mb-3">
              <label class="form-label small" for="signupNome">Seu nome</label>
              <input type="text" class="form-control" id="signupNome" required>
            </div>
            <div class="mb-3">
              <label class="form-label small" for="signupEmpresa">Nome da empresa</label>
              <input type="text" class="form-control" id="signupEmpresa" required>
              <div class="form-text">Se você foi adicionado como sócio por outra pessoa, esse nome é ignorado — você entra direto na empresa do convite.</div>
            </div>
            <div class="mb-3">
              <label class="form-label small" for="signupEmail">Usuário</label>
              <input type="text" class="form-control" id="signupEmail" pattern="[a-zA-Z0-9_.\-]+" autocapitalize="off" autocorrect="off" required>
              <div class="form-text">Só letras, números, ponto, hífen ou underline — sem espaços.</div>
            </div>
            <div class="mb-3">
              <label class="form-label small" for="signupPassword">Senha</label>
              <input type="password" class="form-control" id="signupPassword" minlength="6" autocomplete="new-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Criar conta e empresa</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SócioAll — Lançamentos</title>
<script>
  if (localStorage.getItem("sa_sidebar_collapsed") === "1") document.documentElement.classList.add("sa-sidebar-collapsed");
  if (localStorage.getItem("sa_theme") === "dark") document.documentElement.classList.add("dark-theme");
</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://jgazcgtrkqbuzticrktr.supabase.co" crossorigin>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" href="logo-icon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4 page-header">
        <h1 class="h4 mb-0">Lançamentos</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#novoLancamentoModal"><i class="bi bi-plus-lg me-1"></i>Novo lançamento</button>
      </div>

      <div class="card-sa mb-3 p-3">
        <div class="row g-2 align-items-center">
          <div class="col-12 col-md-4">
            <select class="form-select form-select-sm" id="filtroSocio">
              <option value="">Todos os sócios</option>
            </select>
          </div>
          <div class="col-12 col-md-4">
            <select class="form-select form-select-sm" id="filtroCategoria">
              <option value="">Todas as categorias</option>
            </select>
          </div>
          <div class="col-12 col-md-4 text-md-end">
            <button type="button" class="btn btn-sm btn-outline-secondary w-100 w-md-auto" id="btnLimparFiltros">
              <i class="bi bi-x-circle me-1"></i>Limpar filtros
            </button>
          </div>
        </div>
      </div>

      <div class="card-sa p-0">
        <div class="table-responsive table-list-min">
          <table class="table table-sa mb-0 table-hybrid-mobile">
            <thead>
              <tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Quem pagou</th><th>Valor</th><th></th><th></th></tr>
            </thead>
            <tbody id="lancamentosTableBody"></tbody>
          </table>
        </div>
        <div class="sa-pagination">
          <span id="lancamentosPageInfo"></span>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" id="lancamentosPrevBtn"><i class="bi bi-chevron-left"></i> Anterior</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="lancamentosNextBtn">Próxima <i class="bi bi-chevron-right"></i></button>
          </div>
        </div>
      </div>
  </main>
</div>

<div class="modal fade" id="novoLancamentoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="novoLancamentoForm">
        <input type="hidden" id="lancamentoEditId" value="">
        <div class="modal-header">
          <h2 class="h6 modal-title" id="lancamentoModalTitle">Novo lançamento</h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small" for="lancamentoTipo">Tipo</label>
            <select class="form-select" id="lancamentoTipo" required>
              <option value="receita">Receita</option>
              <option value="despesa">Despesa</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="lancamentoDescricao">Descrição</label>
            <input type="text" class="form-control" id="lancamentoDescricao" required>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="lancamentoValor">Valor (R$)</label>
            <input type="number" step="0.01" min="0.01" class="form-control" id="lancamentoValor" required>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="lancamentoData">Data</label>
            <input type="date" class="form-control" id="lancamentoData" required>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="lancamentoCategoria">Categoria</label>
            <select class="form-select" id="lancamentoCategoria"></select>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="lancamentoSocio">Quem pagou (Sócio)</label>
            <select class="form-select" id="lancamentoSocio"></select>
          </div>
          <div class="mb-3">
            <label class="form-label small" for="lancamentoComprovante">Comprovantes (opcional, pode escolher vários)</label>
            <input type="file" class="form-control" id="lancamentoComprovante" accept="image/*,.pdf" multiple>
            <ul class="list-unstyled small mt-2 mb-0" id="lancamentoComprovantesAtuais"></ul>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary w-100" id="lancamentoSubmitBtn">Salvar lançamento</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="verComprovantesModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="h6 modal-title">Comprovantes</h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <ul class="list-unstyled mb-0" id="verComprovantesLista"></ul>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/common.js?v=2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/page-helpers.js"></script>
<script src="js/lancamentos.js"></script>
</body>
</html>

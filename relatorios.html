<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SócioAll — Relatórios</title>
<script>if (localStorage.getItem("sa_sidebar_collapsed") === "1") document.documentElement.classList.add("sa-sidebar-collapsed");</script>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="icon" type="image/png" href="logo-icon.png">
<link href="css/style.css" rel="stylesheet">
</head>
<body>

<button class="mobile-toggle-btn d-md-none" onclick="toggleMobileSidebar()" aria-label="Toggle menu" id="mobileToggleBtn">
  <i class="bi bi-list" id="mobileToggleIcon"></i>
</button>

<div class="mobile-overlay d-md-none" id="mobileOverlay" onclick="toggleMobileSidebar()"></div>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <main class="main-content">
      <h1 class="h4 mb-4">Relatórios</h1>

      <form id="filtroForm" class="card-sa mb-4 row g-2 align-items-end">
        <div class="col-12 col-md-2">
          <label class="form-label small" for="filtroDataInicio">De</label>
          <input type="date" class="form-control" id="filtroDataInicio">
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label small" for="filtroDataFim">Até</label>
          <input type="date" class="form-control" id="filtroDataFim">
        </div>
        <div class="col-12 col-md-2">
          <label class="form-label small" for="filtroTipo">Tipo</label>
          <select class="form-select" id="filtroTipo">
            <option value="">Todos</option>
            <option value="receita">Receita</option>
            <option value="despesa">Despesa</option>
          </select>
        </div>
        <div class="col-12 col-md-3">
          <label class="form-label small" for="filtroSocio">Sócio</label>
          <select class="form-select" id="filtroSocio">
            <option value="">Todos</option>
          </select>
        </div>
        <div class="col-12 col-md-3 d-flex gap-2">
          <button type="submit" class="btn btn-primary w-100"><i class="bi bi-funnel me-1"></i>Filtrar</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="exportarCSV()"><i class="bi bi-download me-1"></i>CSV</button>
          <button type="button" class="btn btn-outline-secondary w-100" onclick="exportarPDF()"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
        </div>
      </form>

      <div class="row g-3 mb-4">
        <div class="col-12 col-md-4">
          <div class="card-sa stat-card">
            <div>
              <div class="label">Receitas no período</div>
              <div class="value value-positive" id="resumoReceitas">—</div>
            </div>
            <div class="stat-icon"><i class="bi bi-graph-up-arrow"></i></div>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="card-sa stat-card">
            <div>
              <div class="label">Despesas no período</div>
              <div class="value value-negative" id="resumoDespesas">—</div>
            </div>
            <div class="stat-icon"><i class="bi bi-graph-down-arrow"></i></div>
          </div>
        </div>
        <div class="col-12 col-md-4">
          <div class="card-sa stat-card">
            <div>
              <div class="label">Saldo do período</div>
              <div class="value" id="resumoLucro">—</div>
            </div>
            <div class="stat-icon"><i class="bi bi-wallet2"></i></div>
          </div>
        </div>
      </div>

      <div class="card-sa p-0">
        <div class="table-responsive table-list-min">
          <table class="table table-sa mb-0">
            <thead><tr><th>Data</th><th>Descrição</th><th>Tipo</th><th>Sócio</th><th>Valor</th></tr></thead>
            <tbody id="relatorioTableBody"></tbody>
          </table>
        </div>
        <div class="sa-pagination">
          <span id="relatorioPageInfo"></span>
          <div class="d-flex gap-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" id="relatorioPrevBtn"><i class="bi bi-chevron-left"></i> Anterior</button>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="relatorioNextBtn">Próxima <i class="bi bi-chevron-right"></i></button>
          </div>
        </div>
      </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf-autotable.min.js"></script>
<script src="js/common.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/page-helpers.js"></script>
<script src="js/relatorios.js"></script>
</body>
</html>
